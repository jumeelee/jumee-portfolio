<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact - Jumee Lee Portfolio</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Expanded:wght@200&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Encode Sans Expanded', sans-serif;
      text-transform: uppercase;
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    a:hover {
      opacity: 0.7;
    }

    .nav-line {
      height: 1px;
      background: #fff;
    }

    .contact-text {
      text-transform: none;
      line-height: 1.6;
      font-size: 14px;
    }

    .form-control {
      background-color: #000;
      color: #fff;
      border: 1px solid #fff;
      border-radius: 0;
    }

    .form-control::placeholder {
      color: #aaa;
    }

    .form-control:focus {
      background-color: #000;
      color: #fff;
      border-color: #fff;
      box-shadow: none;
    }

    .custom-btn {
      background: transparent;
      color: #fff;
      border: 1px solid #fff;
      padding: 10px 24px;
      transition: 0.3s;
    }

    .custom-btn:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>

<body>

<header>
  <nav class="container d-flex justify-content-between align-items-center py-3">
    <div class="d-flex align-items-center gap-2">
      <img src="images/logo.svg" alt="Jumee Logo" style="height:50px;">
      <span>JUMEE LEE</span>
    </div>

    <div class="d-flex gap-4">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="projects.html">PROJECTS</a>
      <a href="#">CONTACT</a>
    </div>
  </nav>
  <div class="nav-line"></div>
</header>

<main class="container py-5">

  <div class="row g-5">
    <div class="col-12 col-md-5">
      <h1>Contact</h1>
      <p class="contact-text">
        If you would like to get in touch, feel free to send a message or contact me through email or Instagram.
      </p>

      <div class="mt-4">
        <p>Email<br>
          <a href="mailto:jurobin361@gmail.com">jurobin361@gmail.com</a>
        </p>

        <p>Phone<br>
          +1 647-401-0864
        </p>

        <p>Instagram<br>
          <a href="https://www.instagram.com/_zumeeee_/" target="_blank">@zu.me.ee</a>
        </p>
      </div>
    </div>

    <div class="col-12 col-md-7">
      <form>
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Your Name">
        </div>

        <div class="mb-3">
          <input type="email" class="form-control" placeholder="Your Email">
        </div>

        <div class="mb-3">
          <textarea class="form-control" rows="6" placeholder="Your Message"></textarea>
        </div>

        <button type="submit" class="custom-btn">Send Message</button>
      </form>
    </div>
  </div>

</main>

<footer class="text-center py-4">
  © 2025 JUMEE. ALL RIGHTS RESERVED.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
